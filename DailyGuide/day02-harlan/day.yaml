daily_riddle:
  question: >
    I was laid down in a shallow sea, yet I now form soft hills beneath your boots. I swell when wet
    and make slick trails, but I rarely form cliffs. What am I?
  answer: Marine shale (Pierre Shale).
daily_challenge:
