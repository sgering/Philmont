    - Water sources as campsites and travel corridors
    - Mountain-plains ecotone access to varied resources
    - Respectful visitation of archaeological and cultural sites
  reflection_question: >
    Imagine this landscape before roads, ranches, and trails. How would you choose a camp, find water,
    and move safely through these hills?
