geology:
  landscape_story: >
    The route climbs from the eastern shale country near Camping Headquarters into cooler forested
    terrain at Harlan, where Upper Cretaceous marine mudrock dominates lower relief and resistant
    ridges or intrusions begin to shape the skyline.
  key_question: Why do some ridges stand up while others dissolve into rounded slopes?
  rock_types:
    - Pierre Shale
    - marine shale and mudrock
    - local sandstone caps
    - porphyry dikes (possible distant skyline influence)
  processes:
    - marine deposition
    - Laramide uplift
    - differential erosion
    - drainage incision
  field_observations:
    - soft rounded hills
    - slick footing when wet
    - sparse cliff-forming outcrop
    - resistant ridges above shale slopes
    - vegetation-mantled slopes
voices_from_the_land:
  theme: Travel corridors, seasonal movement, and mountain-plains borderlands
  evidence_level: Needs source verification
  topics:
